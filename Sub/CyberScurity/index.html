                          {article.title}
                        </h3>
                        <p className="text-slate-600 text-sm mb-8 line-clamp-3 flex-1 leading-relaxed">
                          {article.excerpt}
                        </p>
                        <div className="mt-auto pt-5 border-t border-slate-100 flex items-center justify-between">
                          <div className="flex items-center text-sm font-semibold text-slate-700">
                            <div className="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center mr-2"><User className="w-3 h-3" /></div> {article.author}
                          </div>
                          <span className="text-sm font-bold text-blue-600 flex items-center group-hover:translate-x-1 transition-transform bg-blue-50 px-3 py-1.5 rounded-full">
                            Baca <ChevronLeft className="h-4 w-4 ml-1 rotate-180" />
                          </span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* VIEW 3: HALAMAN TENTANG */}
            {view === 'about' && (
              <div className="max-w-4xl mx-auto animate-in fade-in zoom-in-95 duration-500">
                <div className="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden relative">
                  <div className="h-48 bg-gradient-to-r from-slate-900 via-blue-900 to-indigo-900 relative">
                    <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                  </div>
                  <div className="px-8 sm:px-12 pb-12 relative -mt-20">
                    <div className="w-40 h-40 bg-white rounded-2xl p-2 shadow-xl border border-slate-100 rotate-3 flex items-center justify-center mb-6">
                      <div className="w-full h-full bg-slate-900 rounded-xl flex items-center justify-center -rotate-3 hover:rotate-0 transition-transform duration-300">
                        <Shield className="w-20 h-20 text-blue-500" />
                      </div>
                    </div>
                    
                    <h1 className="text-4xl font-extrabold text-slate-900 mb-2">Olaf <span className="text-blue-600">(Zeeinch)</span></h1>
                    <p className="text-xl text-slate-500 font-medium mb-8 flex items-center"><Terminal className="w-5 h-5 mr-2"/> Bug Hunter & Security Researcher</p>

                    <div className="prose prose-slate max-w-none prose-lg">
                      <p>Halo! Saya Olaf, di komunitas siber lebih dikenal dengan alias <strong>Zeeinch</strong>. Saya mendedikasikan waktu saya untuk berburu celah keamanan di platform besar, membongkar arsitektur aplikasi (Reverse Engineering), dan melaporkannya untuk membuat internet menjadi tempat yang lebih aman.</p>
                      
                      <div className="grid sm:grid-cols-2 gap-6 my-10">
                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                          <h3 className="text-lg font-bold text-slate-900 flex items-center mb-4"><Cpu className="w-5 h-5 mr-2 text-blue-600"/> Keahlian Utama</h3>
                          <ul className="space-y-2 text-slate-600 font-medium text-sm">
                            <li className="flex items-center"><div className="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></div> Android Reverse Engineering</li>
                            <li className="flex items-center"><div className="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></div> Web Application Penetration Testing</li>
                            <li className="flex items-center"><div className="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></div> State Manipulation (React/SPA)</li>
                            <li className="flex items-center"><div className="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></div> Exploit Development</li>
                          </ul>
                        </div>
                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                          <h3 className="text-lg font-bold text-slate-900 flex items-center mb-4"><Globe className="w-5 h-5 mr-2 text-indigo-600"/> Hubungi Saya</h3>
                          <p className="text-sm text-slate-600 mb-4">Punya pertanyaan soal Bug Bounty, atau ingin mendiskusikan temuan keamanan? Jangan ragu untuk mengirimkan pesan!</p>
                          <a href="https://instagram.com/zeeinch.test" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center w-full bg-slate-900 hover:bg-blue-600 text-white font-medium py-3 px-4 rounded-xl transition-colors">
                            <User className="w-4 h-4 mr-2"/> Instagram: @zeeinch.test
                          </a>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* VIEW 4: HALAMAN TERMINAL */}
            {view === 'terminal' && (
              <div className="max-w-5xl mx-auto h-[75vh] animate-in fade-in slide-in-from-bottom-8 duration-500">
                <div className="bg-slate-900 h-full rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col font-mono text-sm">
                  <div className="bg-slate-950 px-4 py-3 flex items-center border-b border-slate-800">
                    <div className="flex space-x-2 mr-4">
                      <div className="w-3 h-3 rounded-full bg-red-500"></div>
                      <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                      <div className="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                    <div className="text-slate-400 text-xs mx-auto opacity-70 flex items-center">
                      <Terminal className="w-3 h-3 mr-1"/> zeeinch@cyber-blog: ~
                    </div>
                  </div>

                  <div className="flex-1 p-6 overflow-y-auto term-scroll bg-slate-900">
                    {termHistory.map((item, idx) => (
                      <div key={idx} className={`mb-2 leading-relaxed ${
                        item.type === 'user' ? 'text-white' : 
                        item.type === 'error' ? 'text-red-400' : 
                        item.type === 'system' ? 'text-blue-400 font-bold' : 'text-green-400'
                      }`}>
                        {item.text}
                      </div>
                    ))}
                    <div ref={terminalEndRef} />
                  </div>

                  <div className="p-4 bg-slate-950 border-t border-slate-800">
                    <form onSubmit={handleTerminalCommand} className="flex items-center w-full">
                      <span className="text-green-500 font-bold mr-2 whitespace-nowrap">zeeinch@cyber-blog:~$</span>
                      <input 
                        type="text" 
                        value={termInput}
                        onChange={(e) => setTermInput(e.target.value)}
                        className="flex-1 bg-transparent text-white outline-none caret-white ml-2"
                        autoFocus
                        autoComplete="off"
                        spellCheck="false"
                      />
                      <button type="submit" className="text-slate-500 hover:text-white p-2">
                        <Send className="w-4 h-4" />
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="bg-slate-950 text-slate-400 py-12 mt-auto border-t border-slate-900 relative overflow-hidden flex-shrink-0 w-full">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-slate-700 to-transparent"></div>
            <div className="max-w-6xl mx-auto px-4 text-center relative z-10">
              <div className="bg-slate-900 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-inner border border-slate-800">
                <Shield className="h-8 w-8 text-blue-500" />
              </div>
              <h4 className="text-xl font-bold text-white mb-2">Keamanan Cyber Security</h4>
              <p className="mb-6 font-medium text-slate-500 text-sm max-w-md mx-auto">Mendokumentasikan kerentanan arsitektur demi ekosistem internet yang lebih aman dan tangguh.</p>
              
              <div className="flex justify-center space-x-4 mb-8">
                <a href="https://instagram.com/zeeinch.test" className="text-slate-400 hover:text-white hover:bg-slate-800 transition-all flex items-center text-sm font-mono bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 shadow-sm">
                  <User className="w-4 h-4 mr-2 text-blue-400" /> @zeeinch.test
                </a>
              </div>
              <p className="text-xs text-slate-600">© {new Date().getFullYear()} Dibangun dengan dedikasi oleh Olaf.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
