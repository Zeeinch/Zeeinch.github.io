<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Menggunakan font Fredoka yang lebih playful untuk game */
            font-family: 'Fredoka', sans-serif; 
            /* Menghapus overflow: hidden agar bisa di-scroll di mobile */
            overflow-x: hidden;
        }

        /* Styling Papan */
        .square {
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        /* Bidak Pemain */
        .player-token {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        /* Animasi Kocok Dadu */
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1) translateY(0); }
            25% { transform: rotate(180deg) scale(1.2) translateY(-10px); }
            50% { transform: rotate(360deg) scale(0.9) translateY(0); }
            75% { transform: rotate(540deg) scale(1.1) translateY(-5px); }
            100% { transform: rotate(720deg) scale(1) translateY(0); }
        }
        .dice-rolling {
            animation: roll 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animasi Modal */
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-animate {
            animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center py-8 px-4 text-slate-800">

    <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-8 bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-white p-6 lg:p-8">
        
        <!-- BAGIAN PAPAN GAME -->
        <div class="w-full lg:w-2/3 flex items-center justify-center">
            <!-- aspect-square menjaga proporsi papan tetap kotak di semua layar -->
            <div id="game-board-container" class="relative w-full max-w-2xl aspect-square">
                <!-- Grid Papan -->
                <div id="game-board" class="grid grid-cols-10 grid-rows-10 h-full w-full border-8 border-indigo-900 rounded-2xl overflow-hidden shadow-inner bg-amber-50"></div>
                
                <!-- Layer SVG (Tangga & Ular) -->
                <div id="svg-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-[10]"></div>
                
                <!-- Layer Bidak -->
                <div id="token-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-[20]"></div>
            </div>
        </div>

        <!-- BAGIAN KONTROL & UI -->
        <div class="w-full lg:w-1/3 flex flex-col justify-between items-center bg-white rounded-2xl shadow-lg border border-slate-100 p-6">
            
            <!-- Header -->
            <div class="text-center w-full mb-6">
                <h1 class="text-4xl font-bold text-indigo-600 mb-2 drop-shadow-sm">Ular Tangga</h1>
                <div class="bg-indigo-50 rounded-xl p-3 border border-indigo-100">
                    <p id="status-message" class="text-lg font-medium text-indigo-900 min-h-[3rem] flex items-center justify-center">
                        Selamat datang! Giliran Pemain 1.
                    </p>
                </div>
            </div>

            <!-- Mode Kesulitan -->
            <div class="w-full mb-6">
                <h3 class="font-semibold text-slate-500 text-center mb-3 text-sm uppercase tracking-wider">Tingkat Kesulitan</h3>
                <div id="difficulty-selector" class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="difficulty" value="keroco" class="peer hidden" checked>
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-slate-200 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white transition-all font-medium">Santai</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="difficulty" value="susah" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-slate-200 peer-checked:bg-amber-500 peer-checked:border-amber-500 peer-checked:text-white transition-all font-medium">Menantang</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="difficulty" value="susah-banget" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-slate-200 peer-checked:bg-rose-500 peer-checked:border-rose-500 peer-checked:text-white transition-all font-medium">Gila</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="difficulty" value="neraka" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-slate-200 peer-checked:bg-purple-600 peer-checked:border-purple-600 peer-checked:text-white transition-all font-medium">Neraka</div>
                    </label>
                </div>
            </div>

            <!-- Dadu -->
            <div class="flex items-center justify-center mb-8 relative">
                <div class="absolute inset-0 bg-indigo-200 blur-xl opacity-50 rounded-full"></div>
                <div id="dice-container" class="w-24 h-24 bg-gradient-to-b from-white to-slate-100 rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-slate-200 flex items-center justify-center relative z-10">
                    <svg id="dice-face" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-800" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="2.5" />
                    </svg>
                </div>
            </div>
            
            <!-- Tombol Aksi -->
            <div class="w-full flex flex-col gap-3">
                <button id="roll-dice-btn" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-4 px-6 rounded-xl text-xl hover:from-indigo-600 hover:to-purple-700 active:scale-95 transition-all shadow-[0_4px_15px_rgba(99,102,241,0.4)]">
                    Kocok Dadu
                </button>
                <button id="reset-btn" class="w-full bg-slate-100 text-slate-600 font-semibold py-3 px-4 rounded-xl hover:bg-slate-200 active:scale-95 transition-all">
                    Mulai Ulang Game
                </button>
            </div>

            <!-- Posisi Pemain -->
            <div class="mt-6 w-full bg-slate-50 p-4 rounded-xl border border-slate-100">
                <h2 class="font-semibold text-slate-500 text-sm uppercase tracking-wider text-center mb-3">Posisi Saat Ini</h2>
                <div id="player-positions" class="flex flex-col gap-2"></div>
            </div>
        </div>
    </div>

    <!-- Modal Kemenangan -->
    <div id="winner-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-center max-w-sm w-full modal-animate border-4 border-amber-300">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Luar Biasa!</h2>
            <p id="winner-message" class="text-xl text-indigo-600 font-semibold mb-8">Pemain 1 Memenangkan Game!</p>
            <button id="play-again-btn" class="w-full bg-amber-400 text-amber-900 font-bold py-4 px-6 rounded-xl text-lg hover:bg-amber-500 active:scale-95 transition-all shadow-lg">
                Main Lagi
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const BOARD_SIZE = 100;
            const players = [
                // Warna token diupdate menjadi solid untuk SVG
                { id: 1, colorHex: '#ef4444', name: 'Pemain Merah' }, 
                { id: 2, colorHex: '#3b82f6', name: 'Pemain Biru' }
            ];
            
            const difficultySettings = {
                keroco:         { snakes: 3, ladders: 8, minSnake: 10, maxSnake: 25, minLadder: 15, maxLadder: 40 },
                susah:          { snakes: 7, ladders: 6, minSnake: 15, maxSnake: 40, minLadder: 10, maxLadder: 30 },
                'susah-banget': { snakes: 11, ladders: 5, minSnake: 20, maxSnake: 60, minLadder: 10, maxLadder: 20 },
                neraka:         { snakes: 15, ladders: 3, minSnake: 30, maxSnake: 80, minLadder: 5,  maxLadder: 15 }
            };

            let snakesAndLadders = {};
            let playerPositions = {};
            let currentPlayerIndex = 0;
            let gameActive = true;
            let gameStarted = false;

            const boardElement = document.getElementById('game-board');
            const tokenLayer = document.getElementById('token-layer');
            const svgLayer = document.getElementById('svg-layer');
            const statusMessage = document.getElementById('status-message');
            const playerPositionsDisplay = document.getElementById('player-positions');
            const rollDiceBtn = document.getElementById('roll-dice-btn');
            const resetBtn = document.getElementById('reset-btn');
            const diceContainer = document.getElementById('dice-container');
            const diceFace = document.getElementById('dice-face');
            const winnerModal = document.getElementById('winner-modal');
            const winnerMessage = document.getElementById('winner-message');
            const playAgainBtn = document.getElementById('play-again-btn');
            const difficultySelector = document.getElementById('difficulty-selector');

            // Pola wajah dadu
            const diceFacesSVG = { 
                1: `<circle cx="12" cy="12" r="2.5" />`, 
                2: `<circle cx="8" cy="8" r="2.5" /><circle cx="16" cy="16" r="2.5" />`, 
                3: `<circle cx="7" cy="7" r="2.5" /><circle cx="12" cy="12" r="2.5" /><circle cx="17" cy="17" r="2.5" />`, 
                4: `<circle cx="7" cy="7" r="2.5" /><circle cx="17" cy="7" r="2.5" /><circle cx="7" cy="17" r="2.5" /><circle cx="17" cy="17" r="2.5" />`, 
                5: `<circle cx="7" cy="7" r="2.5" /><circle cx="17" cy="7" r="2.5" /><circle cx="12" cy="12" r="2.5" /><circle cx="7" cy="17" r="2.5" /><circle cx="17" cy="17" r="2.5" />`, 
                6: `<circle cx="7" cy="6" r="2.5" /><circle cx="17" cy="6" r="2.5" /><circle cx="7" cy="12" r="2.5" /><circle cx="17" cy="12" r="2.5" /><circle cx="7" cy="18" r="2.5" /><circle cx="17" cy="18" r="2.5" />` 
            };

            // Membuat Logika Papan yang Benar (1 di kiri bawah, 100 di kiri atas)
            function createBoard() {
                boardElement.innerHTML = '';
                for (let row = 9; row >= 0; row--) {
                    for (let col = 0; col < 10; col++) {
                        // Logika Zig-Zag (Boustrophedon)
                        const num = (row % 2 === 0) ? (row * 10 + col + 1) : (row * 10 + (9 - col) + 1);
                        const square = document.createElement('div');
                        square.id = `square-${num}`;
                        
                        // Warna Papan catur yang cerah
                        const isEven = (row + col) % 2 === 0;
                        const bgColor = isEven ? 'bg-amber-100' : 'bg-orange-50';
                        
                        square.className = `square flex items-center justify-center text-sm md:text-lg font-bold text-amber-900/40 ${bgColor}`;
                        
                        // Tandai Start dan Finish
                        if (num === 1) square.innerHTML = `<span class="z-0">START</span>`;
                        else if (num === 100) square.innerHTML = `<span class="z-0">FINISH</span>`;
                        else square.innerHTML = `<span class="z-0">${num}</span>`;
                        
                        boardElement.appendChild(square);
                    }
                }
            }

            function generateSnakesAndLadders(difficulty) {
                const settings = difficultySettings[difficulty];
                const connectors = {};
                const occupiedSquares = new Set([1, 100]);

                // Generate Tangga (Naik)
                for (let i = 0; i < settings.ladders; i++) {
                    let start, end, attempts = 0;
                    do {
                        start = Math.floor(Math.random() * 80) + 2; // Mulai dari 2 s.d 81
                        const length = settings.minLadder + Math.floor(Math.random() * (settings.maxLadder - settings.minLadder));
                        end = start + length;
                        attempts++;
                    } while ((occupiedSquares.has(start) || occupiedSquares.has(end) || end >= 100 || Math.floor((start-1)/10) === Math.floor((end-1)/10)) && attempts < 100);
                    
                    if (attempts < 100) {
                        occupiedSquares.add(start); occupiedSquares.add(end);
                        connectors[start] = end;
                    }
                }

                // Generate Ular (Turun)
                for (let i = 0; i < settings.snakes; i++) {
                    let start, end, attempts = 0;
                    do {
                        start = Math.floor(Math.random() * 80) + 20; // Kepala minimal di 20
                        const length = settings.minSnake + Math.floor(Math.random() * (settings.maxSnake - settings.minSnake));
                        end = start - length; // Ekor di bawah
                        attempts++;
                    } while ((occupiedSquares.has(start) || occupiedSquares.has(end) || end <= 1 || Math.floor((start-1)/10) === Math.floor((end-1)/10)) && attempts < 100);
                    
                    if (attempts < 100) {
                        occupiedSquares.add(start); occupiedSquares.add(end);
                        connectors[start] = end;
                    }
                }
                return connectors;
            }

            function drawConnectors() {
                const svgNS = "http://www.w3.org/2000/svg";
                const svgElement = document.createElementNS(svgNS, 'svg');
                svgElement.setAttribute('width', '100%'); 
                svgElement.setAttribute('height', '100%'); 
                svgElement.style.overflow = 'visible';

                // Definisi Filter & Gradient
                const defs = document.createElementNS(svgNS, 'defs');
                
                // Shadow
                const filter = document.createElementNS(svgNS, 'filter');
                filter.setAttribute('id', 'shadow');
                filter.innerHTML = `<feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>`;
                defs.appendChild(filter);
                
                // Array Warna Ular
                const snakeColors = [
                    { id: 'sg1', c1: '#22c55e', c2: '#14532d' }, // Hijau
                    { id: 'sg2', c1: '#ef4444', c2: '#7f1d1d' }, // Merah
                    { id: 'sg3', c1: '#a855f7', c2: '#4c1d95' }  // Ungu
                ];

                snakeColors.forEach(color => {
                    const gradient = document.createElementNS(svgNS, 'linearGradient');
                    gradient.setAttribute('id', color.id);
                    gradient.innerHTML = `<stop offset="0%" stop-color="${color.c1}" /><stop offset="100%" stop-color="${color.c2}" />`;
                    defs.appendChild(gradient);
                });

                svgElement.appendChild(defs); 
                svgLayer.innerHTML = ''; 
                svgLayer.appendChild(svgElement);

                const boardRect = boardElement.getBoundingClientRect();

                Object.entries(snakesAndLadders).forEach(([start, end]) => {
                    const startNum = parseInt(start);
                    const endNum = parseInt(end);
                    const startSquare = document.getElementById(`square-${startNum}`);
                    const endSquare = document.getElementById(`square-${endNum}`);
                    
                    if (!startSquare || !endSquare) return;

                    const startRect = startSquare.getBoundingClientRect();
                    const endRect = endSquare.getBoundingClientRect();
                    
                    const startX = startRect.left - boardRect.left + startRect.width / 2;
                    const startY = startRect.top - boardRect.top + startRect.height / 2;
                    const endX = endRect.left - boardRect.left + endRect.width / 2;
                    const endY = endRect.top - boardRect.top + endRect.height / 2;
                    
                    const isSnake = startNum > endNum;
                    const g = document.createElementNS(svgNS, "g");
                    g.setAttribute('filter', 'url(#shadow)');

                    if (isSnake) {
                        // MENGGAMBAR ULAR (Kepala di START, Ekor di END)
                        const colorTheme = snakeColors[startNum % snakeColors.length];
                        
                        // Hitung kurva
                        const controlX1 = startX + (endX - startX) * 0.3 + (endY - startY) * 0.3;
                        const controlY1 = startY + (endY - startY) * 0.3 - (endX - startX) * 0.3;
                        const controlX2 = startX + (endX - startX) * 0.7 - (endY - startY) * 0.3;
                        const controlY2 = startY + (endY - startY) * 0.7 + (endX - startX) * 0.3;
                        
                        // Rotasi kepala ular menatap menjauhi tubuh (menghadap mangsa)
                        const angleDeg = Math.atan2(startY - controlY1, startX - controlX1) * 180 / Math.PI;

                        // Badan
                        const body = document.createElementNS(svgNS, "path");
                        body.setAttribute('d', `M ${startX} ${startY} C ${controlX1} ${controlY1}, ${controlX2} ${controlY2}, ${endX} ${endY}`); 
                        body.setAttribute('stroke', `url(#${colorTheme.id})`); 
                        body.setAttribute('stroke-width', '16'); 
                        body.setAttribute('fill', 'none'); 
                        body.setAttribute('stroke-linecap', 'round'); 
                        g.appendChild(body);

                        // Kepala
                        const headGroup = document.createElementNS(svgNS, "g");
                        headGroup.setAttribute('transform', `translate(${startX}, ${startY}) rotate(${angleDeg})`);
                        
                        const head = document.createElementNS(svgNS, "path");
                        head.setAttribute('d', "M -10 -12 C 10 -15, 20 -8, 20 0 C 20 8, 10 15, -10 12 Z");
                        head.setAttribute('fill', colorTheme.c1);
                        headGroup.appendChild(head);

                        // Mata Kiri
                        const eye1 = document.createElementNS(svgNS, "circle"); 
                        eye1.setAttribute('cx', '5'); eye1.setAttribute('cy', '-5'); eye1.setAttribute('r', '3'); eye1.setAttribute('fill', 'white'); 
                        headGroup.appendChild(eye1);
                        const pupil1 = document.createElementNS(svgNS, "circle"); 
                        pupil1.setAttribute('cx', '6'); pupil1.setAttribute('cy', '-5'); pupil1.setAttribute('r', '1.5'); pupil1.setAttribute('fill', 'black'); 
                        headGroup.appendChild(pupil1);

                        // Mata Kanan
                        const eye2 = document.createElementNS(svgNS, "circle"); 
                        eye2.setAttribute('cx', '5'); eye2.setAttribute('cy', '5'); eye2.setAttribute('r', '3'); eye2.setAttribute('fill', 'white'); 
                        headGroup.appendChild(eye2);
                        const pupil2 = document.createElementNS(svgNS, "circle"); 
                        pupil2.setAttribute('cx', '6'); pupil2.setAttribute('cy', '5'); pupil2.setAttribute('r', '1.5'); pupil2.setAttribute('fill', 'black'); 
                        headGroup.appendChild(pupil2);

                        // Lidah
                        const tongue = document.createElementNS(svgNS, "path"); 
                        tongue.setAttribute('d', 'M 20 0 L 28 -3 M 28 -3 L 26 0 L 28 3 M 20 0 L 26 0'); 
                        tongue.setAttribute('stroke', '#ef4444'); 
                        tongue.setAttribute('stroke-width', '1.5'); 
                        tongue.setAttribute('fill', 'none');
                        headGroup.appendChild(tongue); 
                        
                        g.appendChild(headGroup);

                    } else {
                        // MENGGAMBAR TANGGA (Bawah ke Atas)
                        const ladderWidth = 20;
                        const angle = Math.atan2(endY - startY, endX - startX);
                        const offsetX = Math.sin(angle) * ladderWidth / 2;
                        const offsetY = -Math.cos(angle) * ladderWidth / 2;

                        // Tiang Kiri & Kanan (Kayu)
                        const rails = document.createElementNS(svgNS, "path"); 
                        rails.setAttribute('d', `M ${startX + offsetX} ${startY + offsetY} L ${endX + offsetX} ${endY + offsetY} M ${startX - offsetX} ${startY - offsetY} L ${endX - offsetX} ${endY - offsetY}`); 
                        rails.setAttribute('stroke', '#92400e'); // Amber 800
                        rails.setAttribute('stroke-width', '6'); 
                        rails.setAttribute('stroke-linecap', 'round'); 
                        g.appendChild(rails);

                        // Pijakan (Anak Tangga)
                        const distance = Math.sqrt((endX - startX)**2 + (endY - startY)**2);
                        const numRungs = Math.floor(distance / 20);
                        
                        for (let i = 1; i <= numRungs; i++) {
                            const rung = document.createElementNS(svgNS, "line");
                            const t = i / (numRungs + 1);
                            
                            const rungX1 = (startX + offsetX) * (1 - t) + (endX + offsetX) * t;
                            const rungY1 = (startY + offsetY) * (1 - t) + (endY + offsetY) * t;
                            const rungX2 = (startX - offsetX) * (1 - t) + (endX - offsetX) * t;
                            const rungY2 = (startY - offsetY) * (1 - t) + (endY - offsetY) * t;
                            
                            rung.setAttribute('x1', rungX1); rung.setAttribute('y1', rungY1); 
                            rung.setAttribute('x2', rungX2); rung.setAttribute('y2', rungY2); 
                            rung.setAttribute('stroke', '#b45309'); // Amber 700
                            rung.setAttribute('stroke-width', '4'); 
                            rung.setAttribute('stroke-linecap', 'round'); 
                            g.appendChild(rung);
                        }
                    }
                    svgElement.appendChild(g);
                });
            }

            function createPlayerTokens() {
                tokenLayer.innerHTML = '';
                players.forEach(player => {
                    const token = document.createElement('div');
                    token.id = `token-${player.id}`;
                    // Desain Bidak Modern (SVG Pin)
                    token.className = `player-token absolute w-8 h-8 md:w-10 md:h-10 flex items-center justify-center`;
                    token.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="${player.colorHex}" stroke="white" stroke-width="2" class="w-full h-full drop-shadow-md">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                    `;
                    tokenLayer.appendChild(token);
                });
            }

            function updateTokenPosition(playerId) {
                const token = document.getElementById(`token-${playerId}`);
                const position = playerPositions[playerId];
                const square = document.getElementById(`square-${position}`);
                
                if (token && square) {
                    const boardRect = boardElement.getBoundingClientRect();
                    const squareRect = square.getBoundingClientRect();
                    
                    // Posisi tengah kotak
                    let left = squareRect.left - boardRect.left + (squareRect.width / 2) - (token.offsetWidth / 2);
                    let top = squareRect.top - boardRect.top + (squareRect.height / 2) - (token.offsetHeight / 2);
                    
                    // Offset agar bidak tidak menumpuk sempurna jika di kotak yang sama
                    const offsetX = (playerId === 1) ? -10 : 10;
                    const offsetY = (playerId === 1) ? -10 : 10;

                    // Menggeser ke atas sedikit karena bentuk pin
                    top -= 10;

                    token.style.transform = `translate(${left + offsetX}px, ${top + offsetY}px)`;
                }
            }

            // Animasi langkah demi langkah
            async function movePlayerStepByStep(diceRoll) {
                const player = players[currentPlayerIndex];
                let currentPos = playerPositions[player.id];
                let targetPos = currentPos + diceRoll;
                
                let overshoot = 0;
                if (targetPos > BOARD_SIZE) {
                    overshoot = targetPos - BOARD_SIZE;
                    targetPos = BOARD_SIZE; // Jalan sampai ujung dulu
                }

                updateStatusMessage(`${player.name} maju ${diceRoll} langkah...`);

                // Maju kotak per kotak
                while (currentPos < targetPos) {
                    currentPos++;
                    playerPositions[player.id] = currentPos;
                    updateTokenPosition(player.id);
                    await new Promise(r => setTimeout(r, 250)); // Delay per langkah
                }

                // Mundur jika kelebihan (Overshoot)
                if (overshoot > 0) {
                    targetPos = BOARD_SIZE - overshoot;
                    await new Promise(r => setTimeout(r, 200));
                    while (currentPos > targetPos) {
                        currentPos--;
                        playerPositions[player.id] = currentPos;
                        updateTokenPosition(player.id);
                        await new Promise(r => setTimeout(r, 250));
                    }
                }

                updatePlayerPositionsDisplay();
                
                // Cek Ular / Tangga setelah selesai jalan
                setTimeout(() => handleSpecialSquares(currentPos), 300);
            }

            function handleRollDice() {
                if (!gameActive) return;
                if (!gameStarted) { 
                    gameStarted = true; 
                    setDifficultyInputs(false); 
                }
                
                // Disable tombol
                rollDiceBtn.disabled = true; 
                rollDiceBtn.classList.add('opacity-50', 'cursor-not-allowed', 'scale-95');
                diceContainer.classList.add('dice-rolling');
                
                setTimeout(() => {
                    diceContainer.classList.remove('dice-rolling');
                    const diceRoll = Math.floor(Math.random() * 6) + 1;
                    updateDiceFace(diceRoll);
                    
                    // Panggil animasi langkah
                    movePlayerStepByStep(diceRoll);
                }, 600);
            }

            function handleSpecialSquares(position) {
                const player = players[currentPlayerIndex];
                
                if (snakesAndLadders[position]) {
                    const endPosition = snakesAndLadders[position];
                    const isSnake = position > endPosition;
                    
                    if (isSnake) {
                        updateStatusMessage(`Oh tidak! ${player.name} digigit ular! 🐍`);
                    } else {
                        updateStatusMessage(`Hore! ${player.name} naik tangga! 🪜`);
                    }
                    
                    playerPositions[player.id] = endPosition;
                    
                    setTimeout(() => {
                        updateTokenPosition(player.id);
                        updatePlayerPositionsDisplay();
                        setTimeout(checkWinCondition, 600);
                    }, 800);
                } else {
                    checkWinCondition();
                }
            }

            function checkWinCondition() {
                const player = players[currentPlayerIndex];
                if (playerPositions[player.id] === BOARD_SIZE) {
                    gameActive = false;
                    rollDiceBtn.disabled = true; 
                    setTimeout(() => showWinnerModal(player.name), 500);
                } else {
                    nextTurn();
                }
            }

            function nextTurn() {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                updateStatusMessage(`Giliran ${players[currentPlayerIndex].name}. Kocok dadu!`);
                rollDiceBtn.disabled = false; 
                rollDiceBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'scale-95');
            }

            function initGame() {
                hideWinnerModal();
                const selectedDifficulty = document.querySelector('input[name="difficulty"]:checked').value;
                snakesAndLadders = generateSnakesAndLadders(selectedDifficulty);
                currentPlayerIndex = 0; 
                gameActive = true; 
                gameStarted = false;
                
                setDifficultyInputs(true);
                players.forEach(p => { playerPositions[p.id] = 1; });
                
                createBoard(); 
                createPlayerTokens(); 
                
                // Tunggu DOM update sebelum pasang elemen
                setTimeout(() => {
                    drawConnectors();
                    players.forEach(player => updateTokenPosition(player.id));
                }, 100);

                updateStatusMessage(`Game Siap! Giliran ${players[currentPlayerIndex].name}.`);
                updatePlayerPositionsDisplay();
                rollDiceBtn.disabled = false; 
                rollDiceBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'scale-95');
                updateDiceFace(1);
            }

            // Fungsi Pendukung UI
            function updateStatusMessage(msg) { statusMessage.textContent = msg; }
            function updatePlayerPositionsDisplay() { 
                playerPositionsDisplay.innerHTML = players.map(p => `
                    <div class="flex items-center justify-between bg-white px-4 py-2 rounded-lg border border-slate-200">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${p.colorHex}"></span>
                            <span class="font-medium text-slate-700">${p.name}</span>
                        </div>
                        <span class="font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">Kotak ${playerPositions[p.id]}</span>
                    </div>
                `).join(''); 
            }
            function updateDiceFace(num) { diceFace.innerHTML = diceFacesSVG[num]; }
            function showWinnerModal(name) { 
                winnerMessage.textContent = `${name} Memenangkan Game!`; 
                winnerModal.classList.remove('hidden'); 
            }
            function hideWinnerModal() { winnerModal.classList.add('hidden'); }
            function setDifficultyInputs(enabled) {
                document.querySelectorAll('input[name="difficulty"]').forEach(input => input.disabled = !enabled);
            }
            
            // Event Listeners
            rollDiceBtn.addEventListener('click', handleRollDice);
            resetBtn.addEventListener('click', initGame);
            playAgainBtn.addEventListener('click', initGame);
            difficultySelector.addEventListener('change', initGame);
            window.addEventListener('resize', () => { 
                drawConnectors(); 
                players.forEach(player => updateTokenPosition(player.id)); 
            });

            // Mulai
            initGame();
        });
    </script>
</body>
</html>
