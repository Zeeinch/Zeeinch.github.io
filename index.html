<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Proyek Interaktif</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Inter & Space Grotesk untuk variasi) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#5eead4', // Teal 300
                            DEFAULT: '#14b8a6', // Teal 500
                            dark: '#0f766e', // Teal 700
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617; /* Slate 950 - Sangat gelap untuk menonjolkan glow */
            margin: 0;
            overflow-x: hidden;
        }
        
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        #hub-container {
            perspective: 1200px;
        }

        /* Glassmorphism Card Premium */
        .hub-card {
            background: rgba(15, 23, 42, 0.4); /* Slate 900 semi transparan */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease;
            position: relative;
            cursor: pointer;
        }

        /* Efek bayangan elegan saat card diam */
        .hub-card {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Efek Glow mengikuti kursor */
        .hub-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(45, 212, 191, 0.15), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 1;
            pointer-events: none;
        }

        .hub-card:hover::before {
            opacity: 1;
        }

        .hub-card:hover {
            box-shadow: 0 20px 40px -5px rgba(20, 184, 166, 0.2), 0 0 20px rgba(20, 184, 166, 0.1);
            border-color: rgba(45, 212, 191, 0.3);
        }
        
        /* Container Thumbnail (Tidak lagi putih mencolok) */
        .thumbnail-container {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.8));
            height: 180px;
            margin: 1rem 1rem 0 1rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transform: translateZ(30px); /* Efek melayang 3D */
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .thumbnail-svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            transition: transform 0.5s ease;
        }

        .hub-card:hover .thumbnail-svg {
            transform: scale(1.08) rotate(-2deg);
        }
        
        .info-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            transform: translateZ(40px);
            position: relative;
            z-index: 2;
        }
        
        .title {
            font-weight: 600;
            color: #f8fafc;
            font-size: 1.1rem;
            line-height: 1.4;
            max-width: 75%;
        }
        
        /* Tombol Start Modern */
        .start-button {
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.4);
            color: white;
        }
        
        .hub-card:hover .start-button {
            transform: scale(1.15) rotate(-15deg);
            box-shadow: 0 8px 25px rgba(20, 184, 166, 0.6);
        }

        /* Gradasi Teks Judul Utama */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #5eead4, #3b82f6);
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-16 px-6 relative">
    
    <canvas id="particle-canvas"></canvas>

    <div class="container mx-auto max-w-7xl z-10">
        <!-- Header Section -->
        <div class="text-center mb-16">
            <span class="text-brand font-medium tracking-wider uppercase text-sm mb-3 block">Jelajahi Karya</span>
            <h1 class="text-5xl md:text-6xl font-display font-bold text-white mb-4">
                Hub <span class="text-gradient">Proyek</span>
            </h1>
            <p class="text-slate-400 max-w-xl mx-auto text-lg">Pilih dan mainkan berbagai simulasi, alat, dan game interaktif yang telah saya kembangkan.</p>
        </div>

        <!-- Container Grid Kartu -->
        <div id="hub-container" class="flex flex-wrap justify-center items-stretch gap-8 md:gap-10">
            <!-- Kartu-kartu proyek akan muncul di sini -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DAFTAR PROYEK (SVG SUDAH DI-REDESAIN UNTUK DARK THEME) ---
            const projects = [
                { 
                    file: 'PORT.html', 
                    title: 'Portfolio Pribadi', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><rect width="80" height="50" x="10" y="5" rx="6" fill="#1e293b" stroke="#334155" stroke-width="2"/><circle cx="50" cy="22" r="10" fill="#2dd4bf"/><path d="M30 45 C 30 32, 70 32, 70 45 Z" fill="#2dd4bf"/><rect x="35" y="55" width="30" height="3" rx="1" fill="#475569"/></svg>` 
                },
                { 
                    file: 'SDEGL.html', 
                    title: 'Suite Gerbang Logika', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><path d="M25 15 H 45 C 65 15, 65 45, 45 45 H 25 Z" stroke="#38bdf8" stroke-width="3" fill="rgba(56, 189, 248, 0.1)"/><line x1="10" y1="20" x2="25" y2="20" stroke="#94a3b8" stroke-width="2"/><line x1="10" y1="40" x2="25" y2="40" stroke="#94a3b8" stroke-width="2"/><line x1="61" y1="30" x2="85" y2="30" stroke="#38bdf8" stroke-width="3"/><circle cx="85" cy="30" r="4" fill="#38bdf8" class="animate-pulse"/></svg>` 
                },
                { 
                    file: 'LIMIT.html', 
                    title: 'Penjelajah Barisan', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><line x1="15" y1="50" x2="85" y2="50" stroke="#334155" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="10" x2="15" y2="50" stroke="#334155" stroke-width="2" stroke-linecap="round"/><path d="M20 40 Q 40 15, 80 12" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 4"/><circle cx="20" cy="40" r="3" fill="#c084fc"/><circle cx="35" cy="25" r="3" fill="#c084fc"/><circle cx="55" cy="16" r="3" fill="#c084fc"/><circle cx="80" cy="12" r="3" fill="#c084fc"/><line x1="15" y1="12" x2="85" y2="12" stroke="#fb7185" stroke-width="1" stroke-dasharray="2,2"/></svg>` 
                },
                { 
                    file: 'TEST.html', 
                    title: 'Alat Pengujian XSS', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><rect width="90" height="50" x="5" y="5" fill="#0f172a" rx="4" stroke="#334155" stroke-width="2"/><rect width="90" height="12" x="5" y="5" fill="#1e293b" rx="4"/><circle cx="15" cy="11" r="2.5" fill="#ef4444"/><circle cx="23" cy="11" r="2.5" fill="#f59e0b"/><circle cx="31" cy="11" r="2.5" fill="#10b981"/><text x="12" y="32" font-family="monospace" font-size="8" fill="#a3e635">&lt;script&gt;</text><text x="25" y="44" font-family="monospace" font-size="8" fill="#f87171">alert(1)</text></svg>` 
                },
                { 
                    file: 'ULAR.html', 
                    title: 'Ular Tangga Klasik', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><rect width="70" height="50" x="15" y="5" fill="#1e293b" rx="4" stroke="#334155" stroke-width="2"/><path d="M 75 15 C 60 25, 85 40, 65 50" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="75" cy="15" r="3" fill="#ef4444"/><line x1="25" y1="45" x2="45" y2="15" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/><line x1="30" y1="43" x2="50" y2="13" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/><line x1="28" y1="35" x2="40" y2="35" stroke="#f59e0b" stroke-width="1.5"/><line x1="33" y1="25" x2="45" y2="25" stroke="#f59e0b" stroke-width="1.5"/></svg>` 
                },
                { 
                    file: 'PBO.html', 
                    title: 'Visualisasi Algoritma', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><line x1="15" y1="55" x2="85" y2="55" stroke="#334155" stroke-width="2" stroke-linecap="round"/><rect x="20" y="35" width="8" height="20" fill="#38bdf8" rx="2"/><rect x="35" y="15" width="8" height="40" fill="#818cf8" rx="2"/><rect x="50" y="40" width="8" height="15" fill="#38bdf8" rx="2"/><rect x="65" y="25" width="8" height="30" fill="#818cf8" rx="2"/><rect x="80" y="10" width="8" height="45" fill="#c084fc" rx="2"/></svg>` 
                },
                { 
                    file: 'KOD.html', 
                    title: 'King of Diamonds', 
                    thumbnailSVG: `<svg class="thumbnail-svg" viewBox="0 0 100 60"><path d="M50 10 L65 30 L50 50 L35 30 Z" fill="none" stroke="#f43f5e" stroke-width="3"/><path d="M50 18 L58 30 L50 42 L42 30 Z" fill="#f43f5e"/><path d="M44 6 L50 12 L56 6 Z" fill="#fbbf24"/><path d="M44 54 L50 48 L56 54 Z" fill="#fbbf24"/></svg>` 
                }
            ];

            const hubContainer = document.getElementById('hub-container');

            function renderProjects() {
                hubContainer.innerHTML = ''; 
                projects.forEach(project => {
                    const card = document.createElement('div');
                    // Menggunakan tag <a> agar seluruh kartu bisa di-klik
                    card.innerHTML = `
                        <a href="Sub/${project.file}" class="hub-card block h-full outline-none focus:ring-2 focus:ring-brand">
                            <div class="thumbnail-container">
                                ${project.thumbnailSVG}
                            </div>
                            <div class="info-container">
                                <h3 class="title">${project.title}</h3>
                                <div class="start-button" aria-label="Mulai ${project.title}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
                                </div>
                            </div>
                        </a>
                    `;
                    hubContainer.appendChild(card.firstElementChild);
                });
                
                add3DEffects();
            }

            // --- FUNGSI UNTUK EFEK 3D & GLOW ---
            function add3DEffects() {
                const cards = document.querySelectorAll('.hub-card');
                cards.forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        // Menyesuaikan titik tengah untuk rotasi
                        const centerX = rect.width / 2;
                        const centerY = rect.height / 2;
                        
                        // Menghitung derajat rotasi (diperhalus menjadi max 10 derajat)
                        const rotateX = ((y - centerY) / centerY) * -10; 
                        const rotateY = ((x - centerX) / centerX) * 10;  

                        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                        card.style.setProperty('--mouse-x', `${x}px`);
                        card.style.setProperty('--mouse-y', `${y}px`);
                    });

                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
                    });
                });
            }

            // --- FUNGSI UNTUK LATAR BELAKANG PARTIKEL (Disesuaikan Warnanya) ---
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();

            let particlesArray;
            const mouse = { x: null, y: null, radius: 150 }; // Radius interaksi mouse diperbesar

            window.addEventListener('mousemove', (event) => { mouse.x = event.x; mouse.y = event.y; });
            window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x; this.y = y; 
                    this.directionX = directionX; this.directionY = directionY; 
                    this.size = size; this.color = color;
                    this.baseX = this.x;
                    this.baseY = this.y;
                    this.density = (Math.random() * 30) + 1;
                }
                draw() { 
                    ctx.beginPath(); 
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); 
                    ctx.fillStyle = this.color; 
                    ctx.fill(); 
                }
                update() {
                    // Cek tabrakan dengan batas layar
                    if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                    if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                    
                    // Interaksi partikel menghindar dari kursor
                    let dx = mouse.x - this.x; 
                    let dy = mouse.y - this.y; 
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        const directionX = forceDirectionX * force * this.density * 0.6;
                        const directionY = forceDirectionY * force * this.density * 0.6;
                        this.x -= directionX;
                        this.y -= directionY;
                    } else {
                        // Kembali ke kecepatan awal perlahan
                        if (this.x !== this.baseX) { this.x -= this.directionX; }
                        if (this.y !== this.baseY) { this.y -= this.directionY; }
                    }
                    
                    this.x += this.directionX; 
                    this.y += this.directionY; 
                    this.draw();
                }
            }

            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 12000; // Dikurangi sedikit agar lebih bersih
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 2) + 0.5;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * 0.5) - 0.25;
                    let directionY = (Math.random() * 0.5) - 0.25;
                    let color = 'rgba(45, 212, 191, 0.4)'; // Teal warnanya disesuaikan
                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function connectParticles() {
                let opacityValue = 1;
                const maxDistance = 150;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let dx = particlesArray[a].x - particlesArray[b].x;
                        let dy = particlesArray[a].y - particlesArray[b].y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < maxDistance) {
                            opacityValue = 1 - (distance / maxDistance);
                            ctx.strokeStyle = `rgba(45, 212, 191, ${opacityValue * 0.2})`; // Garis koneksi halus
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                animationFrameId = requestAnimationFrame(animateParticles);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                }
                connectParticles();
            }

            function startAnimation() {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                initParticles();
                animateParticles();
            }

            startAnimation();
            renderProjects();
        });
    </script>
</body>
</html>
